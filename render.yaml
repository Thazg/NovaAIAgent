services:
  - type: web
    name: nova-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: TOP_K
        value: 5
      - key: MIN_SIMILARITY_SCORE
        value: 0.12
