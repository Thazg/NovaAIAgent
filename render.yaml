services:
  - type: web
    name: nova-backend
    runtime: python
    pythonVersion: "3.12"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: TOP_K
        value: 5
      - key: MIN_SIMILARITY_SCORE
        value: 0.12
      - key: PYTHONPATH
        value: /app/backend
      - key: B2_KEY_ID
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET
        value: nova-ai-storage
      - key: B2_ENDPOINT
        value: https://s3.us-west-004.backblazeb2.com
